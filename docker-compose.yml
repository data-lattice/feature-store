version: "3.9"
services:
  store:
    build: ./store
    restart: unless-stopped
    ports:
      - "3000:3000"
  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      - db
  registry:
    build: ./registry
    restart: unless-stopped
    depends_on:
      - db
  infra:
    build: ./infra
    restart: unless-stopped
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
